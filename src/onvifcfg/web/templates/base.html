<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}onvifcfg{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1><a href="/">onvifcfg</a></h1>
    <nav>ONVIF network configuration</nav>
  </header>
  <main>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    {% block content %}{% endblock %}
  </main>
  <footer>
    <small>
      local instance - this tool reconfigures cameras - do not expose on a
      network.  <a href="https://github.com/andrewhack/odm">source</a>
    </small>
  </footer>
</body>
</html>
